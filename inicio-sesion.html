<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF · Inicio de sesión</title>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <link rel="stylesheet" href="css/inicio-sesion.css">
    <link rel="icon" href="assets/img/LogoSGF.png" type="image/png">
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <i class="fas fa-chart-bar login-icon"></i>
            <h1 class="login-title">SGF</h1>
        </div>

        <form class="login-form">
            <input type="email" class="login-input" placeholder="correo@gmail.com" required>
            <input type="password" class="login-input" placeholder="contraseña123" required>

            <a href="#" class="login-link">¿Olvidó su contraseña?</a>

            <a href="index.html" class="login-btn">Ingresar</a>
        </form>
    </div>
</body>
</html>
