<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas</title>
    <link rel="stylesheet" href="../css/ventas.css">
</head>
<body>
    <div class="ventas">
        <header class="ventas-top">
            <section class="venta-input">
                <div class="venta-label">ID de la factura actual de la venta</div>
                <input
                    class="venta-search"
                    type="text"
                    placeholder="Lugar para código de barras ó nombre del medicamento a vender"
                    aria-label="Código de barras o nombre del medicamento"
                />
                <button class="venta-ok" type="button">OK</button>
            </section>

            <section class="venta-preview">
                <div class="preview-card">
                    Previsualización del medicamento en base al<br />
                    código de barras
                </div>
            </section>
        </header>

        <section class="ventas-bottom">
            <div class="factura-pill">Factura física<br>del ID actual</div>

            <div class="ventas-grid" role="table" aria-label="Tabla de ventas">
                <div class="grid-row" role="row">
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                </div>
                <div class="grid-row" role="row">
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                </div>
                <div class="grid-row" role="row">
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                </div>
                <div class="grid-row" role="row">
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                </div>
                <div class="grid-row" role="row">
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                </div>
                <div class="grid-row" role="row">
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                </div>
                <div class="grid-row" role="row">
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                    <div class="cell" role="cell">&nbsp;</div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
