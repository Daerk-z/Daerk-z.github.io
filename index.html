<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF · panel</title>
    <!-- Carga íconos de la página FONT AWESOME-->>
    <link rel="icon" href="assets/img/LogoSGF.png" type="image/png">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar: menú de navegación (izquierda) -->
        <aside class="sgf-sidebar">
            <div class="sgf-content">
                <div class="sgf-header">
                    <div class="sgf-title">
                        <i class="fas fa-chart-bar"></i> SGF
                    </div>
                    <hr class="sgf-rule" />
                </div>

                <div class="nav-section">
                    <div class="nav-section-header">General</div>
                    <ul class="nav-items">
                        <li class="nav-item"><a href="frames/inicio.html" target="sgf-frame"><i class="fas fa-home"></i> Inicio</a></li>
                        <li class="nav-item"><a href="frames/ventas.html" target="sgf-frame"><i class="fas fa-chart-line"></i> Ventas</a></li>
                        <li class="nav-item"><a href="frames/inventario.html" target="sgf-frame"><i class="fas fa-boxes"></i> Inventario</a><li>
                        <li class="nav-item"><a href="frames/expedicion.html" target="sgf-frame"><i class="fas fa-truck"></i> Expedición</a><li>
                        <li class="nav-item"><a href="frames/pedidos.html" target="sgf-frame"><i class="fas fa-clipboard-list"></i> Pedidos</a><li>
                    </ul>
                </div>

                <div class="nav-section">
                    <div class="nav-section-header">Reportes y seguridad</div>
                    <ul class="subnav">
                        <li class="subnav-item"><i class="fas fa-exclamation-triangle"></i> Alertas sanitarias</li>
                        <li class="subnav-item"><i class="fas fa-shield-alt"></i> Seguridad</li>
                    </ul>
                </div>

                    <div class="sgf-bottom-block">
                    <hr class="divider-light" />
                    <div class="user-profile">
                        <div class="user-avatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="user-info">
                            <div class="user-name">Nombre del usuario</div>
                            <div class="user-email">
                                <i class="fas fa-envelope"></i> Correo@gmail.com
                            </div>
                        </div>
                    </div>

                    <ul class="footer-nav">
                        <li class="footer-item"><i class="fas fa-cog"></i> Configuración</li>
                        <li class="footer-item"><a href="inicio-sesion.html"><i class="fas fa-sign-out-alt"></i> Salir</a></li>
                    </ul>
                </div>
            </div>
        </aside>

        <!-- Área central: iframe para cargar documentos HTML -->
        <main class="sgf-main">
            <iframe
                name="sgf-frame"
                class="sgf-frame"
                src="contenido.html"
                title="Contenido de la opción seleccionada"
            ></iframe>
        </main>
    </div>
</body>
</html>
